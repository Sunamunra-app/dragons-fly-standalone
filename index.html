<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Dragon's Fly</title>
    
    <!-- Yandex.RTB -->
    <script>window.yaContextCb=window.yaContextCb||[]</script>
    <script src="https://yandex.ru/ads/system/context.js" async></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            overscroll-behavior: none;
        }
        
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            
            /* Запрет выделения текста и изображений */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            
            /* Запрет перетаскивания изображений */
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            
            /* Блокировка жестов */
            touch-action: none;
            -ms-touch-action: none;
        }
        
        /* Запрет контекстного меню и выделения для всех элементов */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
            user-drag: none;
        }
        
        img {
            pointer-events: none;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            -webkit-touch-callout: none;
        }
        
        canvas {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            -webkit-touch-callout: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Поддержка безопасных зон для iOS (notch) */
            padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
        }
        
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            border: 4px solid #0f3460;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            /* Canvas будет масштабироваться через JavaScript */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* Адаптация для мобильных в альбомной ориентации */
        @media (orientation: landscape) and (max-height: 600px) {
            canvas {
                border-width: 2px;
            }
        }
        
        /* Адаптация для мобильных в портретной ориентации */
        @media (orientation: portrait) {
            canvas {
                border-width: 2px;
            }
        }
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 20;
        }
        
        #gameOver button {
            margin-top: 20px;
            background: none;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 0;
            transition: all 0.2s;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        #gameOver button img {
            display: block;
            width: min(320px, 80vw);
            height: auto;
        }
        
        #gameOver button:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }
        
        #gameOver button:active {
            transform: scale(0.95);
        }
        
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            overflow: hidden;
        }
        
        #startScreen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('dragon_background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }
        
        #startScreen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }
        
        #startScreen button {
            background: none;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 0;
            transition: all 0.2s;
            opacity: 0.5;
        }
        
        #startScreen button:disabled {
            cursor: wait;
            opacity: 0.5;
            filter: grayscale(0.5);
        }
        
        #startScreen button:not(:disabled) {
            opacity: 1;
        }
        
        #startScreen button img {
            display: block;
            width: min(280px, 70vw);
            height: auto;
        }
        
        #startScreen button:hover:not(:disabled) {
            transform: scale(1.05);
            filter: brightness(1.2);
        }
        
        #startScreen button:active:not(:disabled) {
            transform: scale(0.95);
        }
        
        #introScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            animation: fadeOutIntro 1s ease-in-out 4s forwards;
        }
        
        @keyframes fadeOutIntro {
            0% {
                opacity: 1;
                pointer-events: auto;
            }
            100% {
                opacity: 0;
                pointer-events: none;
            }
        }
        
        #introScreen img {
            max-width: 80vw;
            max-height: 60vh;
            opacity: 0;
            animation: logoFadeInOut 5s ease-in-out forwards;
        }
        
        @keyframes logoFadeInOut {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }
            20% {
                opacity: 1;
                transform: scale(1);
            }
            80% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(1.05);
            }
        }
        
        /* Скрытие Яндекс рекламы на мобильных если мешает */
        @media (max-width: 768px) {
            #yandex_rtb_R-A-18977770-42 {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="introScreen">
            <img src="game_logo.png" alt="Dragon's Fly">
        </div>
        
        <div id="startScreen">
            <button id="startBtn" disabled><img src="play_button.png" alt="Играть"></button>
        </div>
        
        <div id="gameOver">
            <button id="restartBtn"><img src="restart_button.png" alt="Играть снова"></button>
        </div>
    </div>
    
    <!-- Yandex Games SDK -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
    
    <!-- VK Bridge SDK -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <!-- Game Modules -->
    <script src="audioManager.js"></script>
    <script src="levelsManager.js"></script>
    <script src="sdkManager.js"></script>
    
    <!-- Canvas Auto-Resize Script -->
    <script>
    // Адаптивное масштабирование canvas под все устройства
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const container = document.getElementById('gameContainer');
        
        // Базовые размеры игры (логическое разрешение)
        const GAME_WIDTH = 1200;
        const GAME_HEIGHT = 600;
        const ASPECT_RATIO = GAME_WIDTH / GAME_HEIGHT;
        
        function resizeCanvas() {
            // Получаем размеры контейнера с учетом safe-area
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            
            // Рассчитываем размер canvas с сохранением пропорций
            let canvasWidth, canvasHeight;
            
            const containerRatio = containerWidth / containerHeight;
            
            if (containerRatio > ASPECT_RATIO) {
                // Контейнер шире, ограничиваем по высоте
                canvasHeight = containerHeight * 0.95; // 95% высоты
                canvasWidth = canvasHeight * ASPECT_RATIO;
            } else {
                // Контейнер выше, ограничиваем по ширине
                canvasWidth = containerWidth * 0.95; // 95% ширины
                canvasHeight = canvasWidth / ASPECT_RATIO;
            }
            
            // Устанавливаем размеры canvas (физические пиксели)
            canvas.style.width = Math.floor(canvasWidth) + 'px';
            canvas.style.height = Math.floor(canvasHeight) + 'px';
            
            // Устанавливаем логические размеры (игровое разрешение)
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            
            console.log(`📐 Canvas resized: ${Math.floor(canvasWidth)}×${Math.floor(canvasHeight)} (display), ${GAME_WIDTH}×${GAME_HEIGHT} (logical)`);
        }
        
        // Resize при загрузке и изменении размера окна
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 100); // Небольшая задержка для iOS
        });
        
        // Первоначальный resize
        resizeCanvas();
    })();
    </script>
    
    <script src="game.js"></script>
    <script src="gamePatch.js"></script>
    
    <!-- Yandex.RTB Floor Ads -->
    <script>
    window.yaContextCb.push(() => {

    <script>
    window.yaContextCb.push(() => {
        Ya.Context.AdvManager.render({
            "blockId": "R-A-18977770-40",
            "type": "floorAd",
            "platform": "touch"
        })
    })
    </script>
    
    <!-- Yandex.RTB Banner -->
    <div id="yandex_rtb_R-A-18977770-42"></div>
    <script>
    window.yaContextCb.push(() => {
        Ya.Context.AdvManager.render({
            "blockId": "R-A-18977770-42",
            "renderTo": "yandex_rtb_R-A-18977770-42"
        })
    })
    </script>
    
    <script>
    // Блокировка контекстного меню
    document.addEventListener('contextmenu', e => e.preventDefault());
    
    // Блокировка перетаскивания
    document.addEventListener('dragstart', e => e.preventDefault());
    
    // Блокировка долгого нажатия на iOS
    document.addEventListener('touchstart', e => {
        if (e.target.tagName === 'IMG' || e.target.tagName === 'CANVAS') {
            e.preventDefault();
        }
    }, { passive: false });
    
    // Блокировка жестов масштабирования
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
    document.addEventListener('gestureend', e => e.preventDefault());
    </script>
</body>
</html>
